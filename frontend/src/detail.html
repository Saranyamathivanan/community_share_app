<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Community Share - Detail</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    /* Elegant detail page styling matching the main theme */
    .detail-container {
      max-width: 800px;
      margin: 40px auto;
      padding: 36px 32px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      background: var(--card);
      color: var(--text);
      border: 1.5px solid var(--border);
      transition: box-shadow var(--transition), border-color var(--transition), background var(--transition), color var(--transition);
    }
    .detail-container img {
      max-width: 100%;
      border-radius: 14px;
      margin-bottom: 28px;
      box-shadow: 0 4px 24px #0003;
      border: 1.5px solid var(--border);
      background: #1a2a4f;
    }
    .detail-container h2 {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 12px;
      margin-top: 0;
    }
    .detail-container p {
      font-size: 1.13rem;
      line-height: 1.7;
      color: var(--text);
    }
    .meta {
      font-size: 1rem;
      color: var(--muted);
      margin-top: 24px;
      background: #1a2a4f;
      border-radius: 10px;
      padding: 18px 18px 10px 18px;
      border: 1px solid var(--border);
    }
    .meta p {
      margin: 6px 0;
      color: var(--muted);
      font-size: 1rem;
    }
    .meta strong {
      color: var(--primary);
      font-weight: 600;
    }
    .back-btn {
      display: inline-block;
      margin-top: 28px;
      padding: 12px 28px;
      background: var(--primary);
      color: #0a1628;
      text-decoration: none;
      border-radius: 14px;
      font-weight: 700;
      font-size: 1.08rem;
      border: none;
      box-shadow: 0 4px 16px #5ea1ff33;
      transition: background var(--transition), color var(--transition), box-shadow var(--transition);
    }
    .back-btn:hover {
      background: #388cff;
      color: #fff;
      box-shadow: 0 8px 32px #5ea1ff33;
    }
    header {
      background: rgba(10, 22, 40, 0.92);
      padding: 22px 0 12px 0;
      text-align: center;
      border-bottom: 1.5px solid var(--border);
      box-shadow: var(--shadow);
      margin-bottom: 0;
    }
    header h1 {
      color: var(--primary);
      font-size: 2.1rem;
      font-weight: 900;
      letter-spacing: 0.06em;
      margin: 0;
      text-shadow: 0 2px 8px #0004;
    }
    @media (max-width: 700px) {
      .detail-container {
        padding: 14px 4vw;
      }
      .meta {
        padding: 12px 8px 6px 8px;
      }
      header h1 {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Community Share</h1>
  </header>

  <div class="detail-container">
    <img id="detailImage" src="" alt="Community Knowledge Image">
    <h2 id="detailDesc"></h2>
    <p id="detailLong"></p>

    <div class="meta">
      <p><strong>User:</strong> <span id="userId"></span></p>
      <p><strong>Country:</strong> <span id="country"></span></p>
      <p><strong>City:</strong> <span id="city"></span></p>
      <p><strong>Category:</strong> <span id="category"></span></p>
      <p><strong>Knowledge Type:</strong> <span id="knowledgeType"></span></p>
      <p><strong>GeoLocation:</strong> <span id="geo"></span></p>
    </div>

    <a href="main.html" class="back-btn">⬅ Back to Main</a>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    $(document).ready(function() {
      let item = JSON.parse(sessionStorage.getItem("selectedItem") || "{}");

      if (!item.S3ImageURL) {
        $(".detail-container").html("<p>No item selected. Go back to the main page.</p>");
        return;
      }

      $("#detailImage").attr("src", item.S3ImageURL);
      $("#detailDesc").text(item.Description);
      $("#detailLong").text(item.DetailedDescription);
      $("#userId").text(item.UserID);
      $("#country").text(item.Country);
      $("#city").text(item.City);
      $("#category").text(item.Category);
      $("#knowledgeType").text(item.KnowledgeType);
      $("#geo").text(item.GeoLocation);
    });
  </script>
</body>
</html>
